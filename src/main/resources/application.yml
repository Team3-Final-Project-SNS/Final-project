spring:
  application:
    name: Team3-final
  profiles:
    # SPRING_PROFILES_ACTIVE 환경변수가 없으면 local 프로파일로 실행합니다.
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    # Controller 응답 시점에 지연 로딩이 열려 있지 않도록 막아 트랜잭션 경계를 명확히 합니다.
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}   # 환경변수 없으면 localhost 사용
      port: ${REDIS_PORT:6379}        # 환경변수 없으면 6379 사용
  mail:
    host: smtp.naver.com             # Gmail SMTP 서버 주소
    port: 465                         # TLS 포트 (465는 SSL)
    username: ${MAIL_USERNAME}        # 발송에 사용할 Gmail 주소 (환경변수로 주입)
    password: ${MAIL_PASSWORD}        # Gmail 앱 비밀번호 (환경변수로 주입)
    properties:
      mail:
        smtp:
          auth: true                  # SMTP 인증 사용
          ssl:
            enable: true              # TLS 암호화 활성화
            trust: smtp.naver.com     # TLS 필수
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: ${AI_DEFAULT_MODEL:gpt-4o-mini}
          temperature: ${AI_DEFAULT_TEMPERATURE:0.3}
          max-tokens: ${AI_DEFAULT_MAX_TOKENS:700}
      embedding:
        options:
          model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}

otp:
  expire-seconds: 300         # OTP 유효시간: 5분 (300초)
  cooldown-seconds: 60        # 재발송 쿨다운: 1분 (60초)
  max-resend-count: 10         # 1시간 내 최대 재발송 횟수
  resend-window-seconds: 60 # 재발송 횟수 리셋 주기: 1시간

jwt:
  # 운영 환경에서는 반드시 JWT_SECRET_KEY 환경변수로 주입해야 합니다.
  secret-key: ${JWT_SECRET_KEY}
  # Signup Token 유효 시간: 15분(ms)
  signup-token-validity-time: 900000
  # Access Token 유효 시간: 30분(ms)
  access-token-validity-time: 1800000
  # Refresh Token 유효 시간: 7일(ms)
  refresh-token-validity-time: 604800000
  # Admin AccessToken 유효시간 : 15분(ms)
  admin-access-token-validity-time: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name:Team3-final}

websocket:
  # 프론트 로컬 개발 서버와 백엔드 로컬 서버의 WebSocket 접속을 허용합니다.
  allowed-origins: "http://localhost:3000,http://localhost:8090,http://localhost:5173"

chat:
  # 채팅방 비활성화 기준 시간입니다. 추후 정책 확정 시 만남 시간 기준으로 변경할 수 있습니다.
  inactivity-timeout-minutes: 10

admin:
  init:
    email: ${ADMIN_INIT_EMAIL}
    password: ${ADMIN_INIT_PASSWORD}
    name: ${ADMIN_INIT_NAME}

app:
  ai:
    enabled: ${AI_ENABLED}
    timeout-ms: ${AI_TIMEOUT_MS}

    matching:
      model: ${AI_MATCHING_MODEL}
      max-tokens: ${AI_MATCHING_MAX_TOKENS}
      temperature: ${AI_MATCHING_TEMPERATURE}
#      나중에 도입
#      memory-window-size: ${AI_MATCHING_MEMORY_WINDOW_SIZE:10}
#      stream-enabled: ${AI_MATCHING_STREAM_ENABLED:true}
      rag:
        top-k: ${AI_MATCHING_RAG_TOP_K:5}
        similarity-threshold: ${AI_MATCHING_RAG_SIMILARITY_THRESHOLD:0.65}

    support:
      model: ${AI_SUPPORT_MODEL:gpt-4o-mini}
      max-tokens: ${AI_SUPPORT_MAX_TOKENS:1000}
      temperature: ${AI_SUPPORT_TEMPERATURE:0.2}
      memory-window-size: ${AI_SUPPORT_MEMORY_WINDOW_SIZE:10}
      stream-enabled: ${AI_SUPPORT_STREAM_ENABLED:true}
      rag:
        top-k: ${AI_SUPPORT_RAG_TOP_K:5}
        similarity-threshold: ${AI_SUPPORT_RAG_SIMILARITY_THRESHOLD:0.7}

    report:
      model: ${AI_REPORT_MODEL:gpt-4o-mini}
      max-tokens: ${AI_REPORT_MAX_TOKENS:600}
      temperature: ${AI_REPORT_TEMPERATURE:0.1}

    moderation:
      model: ${AI_MODERATION_MODEL:gpt-4o-mini}
      max-tokens: ${AI_MODERATION_MAX_TOKENS:300}
      temperature: ${AI_MODERATION_TEMPERATURE:0.0}
      rule-first: ${AI_MODERATION_RULE_FIRST:true}
      ai-check-enabled: ${AI_MODERATION_AI_CHECK_ENABLED:true}

    metrics:
      enabled: ${AI_METRICS_ENABLED:true}